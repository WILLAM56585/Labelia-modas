<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fashion Gurupá</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="topo">

<p>🚚 Entregamos em Gurupá - PA</p>

</div>

<div class="logo-area">

<img src="img/logo.png" class="logo">

</div>

<div class="pesquisa">

<input
type="text"
id="pesquisa"
placeholder="Pesquisar roupas...">

<button id="btnPesquisar">

🔍

</button>

</div>

<div class="filtros">

<select id="ordenar">

<option value="todos">

⭐ Populares

</option>

<option value="menor">

Menor preço

</option>

<option value="maior">

Maior preço

</option>

<option value="desconto">

Maior desconto

</option>

</select>

<select id="tamanho">

<option value="">

👗 Tamanho

</option>

<option value="PP">PP</option>

<option value="P">P</option>

<option value="M">M</option>

<option value="G">G</option>

<option value="GG">GG</option>

<option value="XG">XG</option>

<option value="48">48</option>

<option value="50">50</option>

<option value="52">52</option>

</select>

</div>

</header>

<section class="banner">

<img src="img/banner.jpg">

</section>

<section class="categorias">

<button>Todos</button>

<button>Vestidos</button>

<button>Blusas</button>

<button>Calças</button>

<button>Shorts</button>

<button>Conjuntos</button>

</section>

<main>

<div id="listaProdutos" class="lista-produtos">

<!--
Os produtos serão criados automaticamente
pelo JavaScript.
-->

</div>

</main>

<footer>

<p>

© Fashion Gurupá

</p>

</footer>

<script src="produtos.js"></script>

<script src="script.js"></script>

</body>

</html>
